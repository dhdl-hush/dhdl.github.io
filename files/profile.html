<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인물 소개 — 프로필</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --ink: #1a1714;
      --muted: #7a7269;
      --accent: #b8a98a;
      --line: #ddd8cf;
      --card: #ffffff;
      --edit-border: #c8bfb0;
      --edit-focus: #8a7a62;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 720px; width: 100%;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 탭 네비게이션 ── */
    .tab-nav {
      display: flex;
      border-bottom: 1px solid var(--line);
      margin-bottom: 32px;
      gap: 0;
      overflow-x: auto;
    }
    /* 스크롤바 숨김 */
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-nav a {
      text-decoration: none;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 18px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;       /* 탭 아래선이 nav 선과 겹치게 */
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-nav a:hover { color: var(--ink); }
    .tab-nav a.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    /* ── 상단 배너 ── */
    .mode-banner {
      height: 0; overflow: hidden;
      background: var(--ink); color: var(--bg);
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: height 0.4s ease, margin-bottom 0.4s ease;
      margin-bottom: 0;
    }
    body.editing .mode-banner { height: 36px; margin-bottom: 16px; }

    /* ── 라벨 ── */
    .label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 32px;
      display: flex; align-items: center; gap: 12px;
      transition: color 0.3s;
    }
    .label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    body.editing .label { color: var(--edit-focus); }

    /* ── 카드 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
      transition: border-color 0.4s;
    }
    body.editing .card { border-color: var(--edit-border); }

    /* ── 이미지 영역 ── */
    .image-side {
      position: relative; background: #e8e3da;
      overflow: hidden; min-height: 400px;
    }
    .image-side img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.6s ease;
    }
    .card:hover .image-side img { transform: scale(1.03); }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--accent);
      cursor: pointer; transition: background 0.3s;
    }
    .placeholder:hover { background: #ddd8cf; }
    .placeholder-icon {
      width: 48px; height: 48px;
      border: 1.5px dashed var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .placeholder-icon svg { width: 20px; height: 20px; }
    .placeholder-text { font-size: 11px; letter-spacing: 0.1em; font-weight: 400; }

    #imgInput { display: none; }

    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(26,23,20,0);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      transition: background 0.3s;
      opacity: 0; pointer-events: none; z-index: 2;
    }
    .img-overlay svg { width: 22px; height: 22px; color: #fff; }
    .img-overlay span { font-size: 11px; letter-spacing: 0.1em; color: #fff; }
    body.editing .img-overlay { opacity: 1; pointer-events: all; }
    body.editing .img-overlay:hover { background: rgba(26,23,20,0.5); }

    .img-tag {
      position: absolute; bottom: 16px; left: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-style: italic;
      color: var(--muted); letter-spacing: 0.05em;
    }

    /* ── 인물 정보 영역 ── */
    .info-side {
      padding: 36px 40px;
      display: flex; flex-direction: column;
      gap: 0;
    }

    .field-group { display: flex; flex-direction: column; gap: 0; }

    .field-label {
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--edit-focus);
      opacity: 0; height: 0; overflow: hidden;
      transition: opacity 0.3s 0.1s, height 0.3s;
    }
    body.editing .field-label { opacity: 1; height: 14px; }

    .edit-input, .edit-textarea {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid transparent;
      padding: 2px 0; font-family: inherit; color: inherit;
      outline: none; resize: none; pointer-events: none;
      transition: border-color 0.25s, padding 0.25s;
    }
    body.editing .edit-input,
    body.editing .edit-textarea {
      pointer-events: all;
      border-bottom-color: var(--line);
      padding: 4px 0;
    }
    body.editing .edit-input:hover,
    body.editing .edit-textarea:hover { border-bottom-color: var(--edit-border); }
    .edit-input:focus,
    .edit-textarea:focus { border-bottom-color: var(--edit-focus) !important; }

    .name-en-input {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-style: italic;
      color: var(--muted); letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .name-ko-input {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 300;
      line-height: 1.1; letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .role-input {
      font-size: 12px; font-weight: 400;
      color: var(--accent); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .bio-input {
      font-size: 13.5px; line-height: 1.85;
      color: var(--muted); font-weight: 300;
    }
    .meta-input { font-size: 13px; color: var(--ink); font-weight: 300; }

    .divider {
      width: 32px; height: 1px;
      background: var(--accent); margin-bottom: 16px;
    }

    .meta-list {
      display: flex; flex-direction: column; gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 16px; margin-top: 16px;
    }
    .meta-item { display: flex; align-items: baseline; gap: 12px; }
    .meta-key {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); min-width: 56px;
    }

    /* ── 푸터 ── */
    .footer {
      margin-top: 24px;
      display: flex; align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.9s 0.3s ease both;
    }
    .footer-note { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
    .btn-group { display: flex; gap: 8px; }

    .btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--ink); background: transparent;
      border: 1px solid var(--line);
      padding: 9px 20px; cursor: pointer;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    .btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .btn-cancel { display: none; }
    .btn-save   { display: none; background: var(--ink); color: var(--bg); border-color: var(--ink); }
    body.editing .btn-edit   { display: none; }
    body.editing .btn-cancel { display: inline-block; }
    body.editing .btn-save   { display: inline-block; }

    @keyframes flashSave {
      0%   { background: var(--accent); border-color: var(--accent); }
      100% { background: var(--ink);    border-color: var(--ink); }
    }
    .btn-save.saved { animation: flashSave 0.5s ease; }

    @media (max-width: 560px) {
      .card { grid-template-columns: 1fr; }
      .image-side { min-height: 260px; }
      .info-side { padding: 28px 24px; }
      .name-ko-input { font-size: 30px; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- 탭 네비게이션 -->
  <nav class="tab-nav">
    <a href="/dhdl.github.io/index.html">홈</a>
    <a href="profile.html" class="active">프로필</a>
    <a href="detail.html">상세정보</a>
    <a href="story.html">배경이야기</a>
    <a href="relation.html">관계도</a>
    <a href="behind.html">비하인드</a>
    <a href="gallery.html">갤러리</a>
  </nav>

  <div class="mode-banner">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16.862 3.487a2.25 2.25 0 113.182 3.182L7.5 19.213l-4.5 1.5 1.5-4.5L16.862 3.487z"/>
    </svg>
    편집 모드 — 내용을 수정하고 저장하세요
  </div>

  <div class="label" id="pageLabel">Profile</div>

<div class="card">
  <div class="image-side" id="imageSide">
    <div class="placeholder" id="placeholder" onclick="document.getElementById('imgInput').click()">
      <div class="placeholder-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
      </div>
      <span class="placeholder-text">이미지 추가</span>
    </div>

    <div class="img-overlay" onclick="document.getElementById('imgInput').click()">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 18h16.5M3 9h1.5m0 0V7.5A2.25 2.25 0 016.75 5.25h10.5A2.25 2.25 0 0119.5 7.5V9m-15 0h15"/>
      </svg>
      <span>이미지 변경</span>
    </div>

    <input type="file" id="imgInput" accept="image/*" onchange="loadImage(event)" />

    <div class="img-tag" id="imgTag">
      <img id="profile-img" src="" style="width:100%; height:100%; object-fit:cover; display:none;" />
    </div>
  </div> 

    <div class="info-side">
      <div class="field-group">
        <span class="field-label">영문 이름</span>
        <input class="edit-input name-en-input" id="nameEn" type="text" placeholder="영어이름" autocomplete="off" />
      </div>
      <div class="field-group">
        <span class="field-label">한글 이름</span>
        <input class="edit-input name-ko-input" id="nameKo" type="text" placeholder="한글이름" autocomplete="off" />
      </div>
      <div class="field-group">
        <span class="field-label">역할 (Role)</span>
        <input class="edit-input role-input" id="role" type="text" placeholder="직업" autocomplete="off" />
      </div>
      <div class="divider"></div>
      <div class="field-group">
        <span class="field-label">소개글 (Bio)</span>
        <textarea class="edit-textarea bio-input" id="bio" rows="4" placeholder="소개글을 입력하세요"></textarea>
      </div>
      <div class="meta-list">
        <div class="meta-item">
          <span class="meta-key">출생</span>
          <input class="edit-input meta-input" id="meta0" type="text" placeholder="여기에 출생" autocomplete="off" />
        </div>
        <div class="meta-item">
          <span class="meta-key">외형</span>
          <input class="edit-input meta-input" id="meta1" type="text" placeholder="여기에 외형" autocomplete="off" />
        </div>
        <div class="meta-item">
          <span class="meta-key">성격</span>
          <input class="edit-input meta-input" id="meta2" type="text" placeholder="여기에 성격" autocomplete="off" />
        </div>
        <div class="meta-item">
          <span class="meta-key">소개</span>
          <input class="edit-input meta-input" id="meta3" type="text" placeholder="여기에 간략 배경" autocomplete="off" />
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note">© 2026 · 인물 소개 페이지</span>
    <div class="btn-group">
    <button class="btn btn-edit" onclick="enterEdit()">Edit Profile</button>
    <button class="btn btn-cancel" onclick="cancelEdit()">취소</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveEdit()">저장하기</button>
    </div>
  </div>

</div>

<script>
  let snapshot = {};
  function captureValues() {
    return {
      nameEn: val('nameEn'), nameKo: val('nameKo'),
      role: val('role'), bio: val('bio'),
      meta: [val('meta0'), val('meta1'), val('meta2'), val('meta3')]
    };
  }
  function val(id) { return document.getElementById(id).value; }
  function set(id, v) { document.getElementById(id).value = v; }

  function enterEdit() {
    snapshot = captureValues();
    document.body.classList.add('editing');
    document.getElementById('pageLabel').textContent = 'Edit Profile';
    autoResize(document.getElementById('bio'));
  }
  function cancelEdit() {
    set('nameEn', snapshot.nameEn); set('nameKo', snapshot.nameKo);
    set('role', snapshot.role); set('bio', snapshot.bio);
    snapshot.meta.forEach((v, i) => set('meta' + i, v));
    document.body.classList.remove('editing');
    document.getElementById('pageLabel').textContent = 'Profile';
  }
  function saveEdit() {
    document.body.classList.remove('editing');
    document.getElementById('pageLabel').textContent = 'Profile';
    const btn = document.getElementById('saveBtn');
    btn.classList.add('saved'); btn.textContent = '저장됨 ✓';
    setTimeout(() => { btn.classList.remove('saved'); btn.textContent = '저장하기'; }, 2000);
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
  document.getElementById('bio').addEventListener('input', function() { autoResize(this); });

  function loadImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const side = document.getElementById('imageSide');
      const ph = document.getElementById('placeholder');
      const tag = document.getElementById('imgTag');
      if (ph) ph.style.display = 'none';
      let img = side.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        side.insertBefore(img, side.querySelector('.img-overlay'));
      }
      img.src = e.target.result;
      tag.textContent = file.name.replace(/\.[^.]+$/, '');
    };
    reader.readAsDataURL(file);
  }
</script>
  <script type="module">
  // 1. 필요한 기능들만 가져오기 (SDK 불러오기)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 2. 아까 복사한 본인의 설정값을 여기에 붙여넣으세요
const firebaseConfig = {
  apiKey: "AIzaSyAUjW1D8bQ_P1o0GQpSo2zAswwA7SvT97I",
  authDomain: "dhdl-48b4a.firebaseapp.com",
  projectId: "dhdl-48b4a",
  storageBucket: "dhdl-48b4a.firebasestorage.app",
  messagingSenderId: "970954764585",
  appId: "1:970954764585:web:7388d241cc77ec70dd8738",
  measurementId: "G-DV6XRPBJV4"
  };

  // 3. 파이어베이스 및 파이어스토어 초기화
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

// [A] 페이지 로드 시 데이터 불러오기
window.onload = async () => {
  try {
    const docSnap = await getDoc(doc(db, "web_data", "profile_page"));
    if (docSnap.exists()) {
      const data = docSnap.data();
      
      // 1. 텍스트 데이터 채우기
      if(data.nameEn) document.getElementById('nameEn').value = data.nameEn;
      if(data.nameKo) document.getElementById('nameKo').value = data.nameKo;
      if(data.role) document.getElementById('role').value = data.role;
      if(data.bio) document.getElementById('bio').value = data.bio;
      if(data.meta0) document.getElementById('meta0').value = data.meta0;
      if(data.meta1) document.getElementById('meta1').value = data.meta1; 
      if(data.meta2) document.getElementById('meta2').value = data.meta2; 
      if(data.meta3) document.getElementById('meta3').value = data.meta3;

      // 2. 이미지 데이터 처리
     if (data.profileImage) {
  const side = document.getElementById('imageSide');
  let imgElement = document.getElementById('profile-img');

  // img 태그가 없으면 새로 만들기
  if (!imgElement) {
    imgElement = document.createElement('img');
    imgElement.id = 'profile-img';
    side.insertBefore(imgElement, side.querySelector('.img-overlay'));
  }

  imgElement.src = data.profileImage;
  imgElement.style.display = 'block';

  const placeholder = document.getElementById('placeholder');
  if (placeholder) placeholder.style.display = 'none';
}
};
// [B] 저장 기능
window.saveEdit = async () => {
  const profileImg = document.getElementById('profile-img');

  // 1. 기본값 설정 (이미지가 없으면 빈 값, 있으면 기존 주소)
  let finalImg = profileImg && profileImg.src ? profileImg.src : "";

  // 2. 새로 업로드한 이미지(data:image)일 때만 압축 진행
  if (profileImg && profileImg.src.startsWith('data:image')) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    // ⭐ [중요] 사진 크기를 못 불러올 경우를 대비해 기본값 500 설정
    const originWidth = profileImg.naturalWidth || 500;
    const originHeight = profileImg.naturalHeight || 500;
    
    canvas.width = 500; 
    canvas.height = originHeight * (500 / originWidth);

    ctx.drawImage(profileImg, 0, 0, canvas.width, canvas.height);
    finalImg = canvas.toDataURL('image/jpeg', 0.6); 
  }

  // 3. 데이터 묶기
  const profileData = {
    nameEn: document.getElementById('nameEn').value,
    nameKo: document.getElementById('nameKo').value,
    role: document.getElementById('role').value,
    bio: document.getElementById('bio').value,
    meta0: document.getElementById('meta0').value,
    meta1: document.getElementById('meta1').value,
    meta2: document.getElementById('meta2').value,
    meta3: document.getElementById('meta3').value,
    profileImage: finalImg, // 압축된 이미지 데이터
    lastUpdated: new Date()
  };

  try {
    await setDoc(doc(db, "web_data", "profile_page"), profileData);
    alert("서버에 성공적으로 저장되었습니다!");
    location.reload(); 
  } catch (e) {
    console.error("저장 실패:", e);
    alert("저장에 실패했습니다.");
  }
};
</script>
