<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인물 소개 — 비하인드</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed; --ink: #1a1714; --muted: #7a7269;
      --accent: #b8a98a; --line: #ddd8cf; --card: #ffffff;
    }
    body {
      background: var(--bg); color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .page {
      position: relative; z-index: 1;
      max-width: 720px; width: 100%;
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tab-nav {
      display: flex; border-bottom: 1px solid var(--line);
      margin-bottom: 32px; overflow-x: auto;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-nav a {
      text-decoration: none; font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); padding: 10px 18px;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      white-space: nowrap; transition: color 0.2s, border-color 0.2s;
    }
    .tab-nav a:hover { color: var(--ink); }
    .tab-nav a.active { color: var(--ink); border-bottom-color: var(--ink); }

    .label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 32px;
      display: flex; align-items: center; gap: 12px;
    }
    .label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

    .card {
      background: var(--card); border: 1px solid var(--line);
      padding: 40px;
    }

    /* 내용 영역 — 각 파일에서 자유롭게 채우세요 */
    .content-placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 240px; gap: 12px;
      color: var(--accent);
      border: 1.5px dashed var(--line);
    }
    .content-placeholder svg { width: 28px; height: 28px; }
    .content-placeholder p {
      font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
    }

    .footer {
      margin-top: 24px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .footer-note { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  </style>
</head>
<body>
<div class="page">

  <nav class="tab-nav">
    <a href="profile.html">프로필</a>
    <a href="detail.html">비하인드</a>
    <a href="story.html">배경이야기</a>
    <a href="relation.html">관계도</a>
    <a href="behind.html" class="active">비하인드</a>
    <a href="gallery.html">갤러리</a>
  </nav>

  <div class="label">비하인드</div>

  <div class="card">
    <!-- 여기에 비하인드 내용을 채워주세요 -->
    <div class="content-placeholder">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
      <p>비하인드 내용을 여기에 추가하세요</p>
    </div>
  </div>

  <div class="footer">
    <span class="footer-note">© 2026 · 인물 소개 페이지</span>
  </div>

</div>
</body>
</html>
