<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인물 소개</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --ink: #1a1714;
      --muted: #7a7269;
      --accent: #b8a98a;
      --line: #ddd8cf;
      --card: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── header label ── */
    .label {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ── card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    /* ── image side ── */
    .image-side {
      position: relative;
      background: #e8e3da;
      overflow: hidden;
      min-height: 400px;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .card:hover .image-side img {
      transform: scale(1.03);
    }

    /* placeholder when no image */
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.3s;
      position: relative;
    }
    .placeholder:hover { background: #ddd8cf; }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border: 1.5px dashed var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .placeholder-icon svg { width: 20px; height: 20px; }

    .placeholder-text {
      font-size: 11px;
      letter-spacing: 0.1em;
      font-weight: 400;
    }

    /* hidden file input */
    #imgInput { display: none; }

    /* image number tag */
    .img-tag {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── info side ── */
    .info-side {
      padding: 44px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 32px;
    }

    .info-top {}

    .name-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .name-ko {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .role {
      font-size: 12px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin-bottom: 24px;
    }

    .bio {
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── meta list ── */
    .meta-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    .meta-item {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .meta-key {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      min-width: 56px;
    }

    .meta-val {
      font-size: 13px;
      color: var(--ink);
      font-weight: 300;
    }

    /* ── footer ── */
    .footer {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .footer-note {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .edit-btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--line);
      padding: 9px 20px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }
    .edit-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .btn { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink); background: transparent; border: 1px solid var(--line); padding: 9px 20px; cursor: pointer; transition: background 0.25s, border-color 0.25s; }
.btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }


    /* ── responsive ── */
    @media (max-width: 560px) {
      .card { grid-template-columns: 1fr; }
      .image-side { min-height: 260px; }
      .info-side { padding: 32px 24px; }
      .name-ko { font-size: 32px; }
    }
    /* 상단 배너 */
.mode-banner {
  height: 0;
  overflow: hidden;
  background: var(--ink);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: height 0.4s ease, margin-bottom 0.4s ease;
  margin-bottom: 0;
}
body.editing .mode-banner {
  height: 36px;
  margin-bottom: 16px;
}

/* 편집 모드일 때 card 테두리 색 변경 */
body.editing .card { border-color: var(--edit-border); }
body.editing .label { color: var(--edit-focus); }

/* 각 필드 위에 뜨는 라벨 */
    .field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--edit-focus);
  opacity: 0; height: 0; overflow: hidden;
  transition: opacity 0.3s 0.1s, height 0.3s;
}
body.editing .field-label { opacity: 1; height: 14px; }

/* input/textarea — 기본엔 투명, 편집 모드에서만 활성화 */
.edit-input, .edit-textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  padding: 2px 0;
  font-family: inherit;
  color: inherit;
  outline: none;
  resize: none;
  pointer-events: none; /* 뷰 모드에서 클릭 차단 */
  transition: border-color 0.25s, padding 0.25s;
}
body.editing .edit-input,
body.editing .edit-textarea {
  pointer-events: all;
  border-bottom-color: var(--line);
  padding: 4px 0;
}
body.editing .edit-input:hover,
body.editing .edit-textarea:hover { border-bottom-color: var(--edit-border); }
.edit-input:focus,
.edit-textarea:focus { border-bottom-color: var(--edit-focus) !important; }

/* 이미지 변경 오버레이 */
.img-overlay {
  position: absolute;
  inset: 0;
  background: rgba(26,23,20,0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.3s;
  opacity: 0;
  pointer-events: none;
  z-index: 2;
}
.img-overlay svg { width: 22px; height: 22px; color: #fff; }
.img-overlay span { font-size: 11px; letter-spacing: 0.1em; color: #fff; }
body.editing .img-overlay { opacity: 1; pointer-events: all; }
body.editing .img-overlay:hover { background: rgba(26,23,20,0.5); }

/* 버튼 전환 */
.btn-cancel { display: none; }
.btn-save   { display: none; background: var(--ink); color: var(--bg); border-color: var(--ink); }
body.editing .btn-edit   { display: none; }
body.editing .btn-cancel { display: inline-block; }
body.editing .btn-save   { display: inline-block; }

/* 저장 완료 플래시 */
@keyframes flashSave {
  0%   { background: var(--accent); border-color: var(--accent); }
  100% { background: var(--ink);    border-color: var(--ink); }
}
.btn-save.saved { animation: flashSave 0.5s ease; }
  </style>
</head>
<body>

<div class="page">

  <!-- 상단 편집 배너 -->
<div class="mode-banner">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M16.862 3.487a2.25 2.25 0 113.182 3.182L7.5 19.213l-4.5 1.5 1.5-4.5L16.862 3.487z"/>
  </svg>
  편집 모드 — 내용을 수정하고 저장하세요
</div>
  
<div class="label" id="pageLabel">Profile</div>
  
  <div class="card">

    <!-- 이미지 영역 -->
    <div class="image-side" id="imageSide">
      <div class="placeholder" id="placeholder" onclick="document.getElementById('imgInput').click()">
        <div class="placeholder-icon">
          <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
        </div>
        <span class="placeholder-text">이미지 추가</span>
      </div>
      <!-- 이미지 변경 오버레이 (image-side 안에 삽입) -->
<div class="img-overlay" onclick="document.getElementById('imgInput').click()">
  <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 18h16.5M3 9h1.5m0 0V7.5A2.25 2.25 0 016.75 5.25h10.5A2.25 2.25 0 0119.5 7.5V9m-15 0h15"/>
  </svg>
  <span>이미지 변경</span>
</div>

<!-- 각 텍스트 필드에 field-label + field-group 래핑 예시 -->
<div class="field-group" style="margin-bottom:8px">
  <span class="field-label">영문 이름</span>
  <input class="edit-input name-en-input" id="nameEn" type="text" value="Kim Soo-yeon" />
</div>

<!-- 기존 Edit Profile 버튼 옆에 취소/저장 버튼 추가 -->
<button class="btn btn-cancel" onclick="cancelEdit()">취소</button>
<button class="btn btn-save" id="saveBtn" onclick="saveEdit()">저장하기</button>
      <input type="file" id="imgInput" accept="image/*" onchange="loadImage(event)" />
      <div class="img-tag" id="imgTag"></div>
    </div>

  <!-- 인물 정보 영역 -->
<div class="info-side">
  <div class="info-top">

    <div class="field-group" style="margin-bottom:8px">
      <span class="field-label">영문 이름</span>
      <input class="edit-input name-en-input" id="nameEn" type="text" value="영어이름" />
    </div>

    <div class="field-group" style="margin-bottom:6px">
      <span class="field-label">한글 이름</span>
      <input class="edit-input name-ko-input" id="nameKo" type="text" value="한글이름" />
    </div>

    <div class="field-group" style="margin-bottom:28px">
      <span class="field-label">역할 (Role)</span>
      <input class="edit-input role-input" id="role" type="text" value="직업" />
    </div>

    <div class="divider"></div>

 <div class="field-group" style="margin-bottom:5px">
      <span class="field-label">소개글 (Bio)</span>
      <textarea class="edit-textarea bio-input" id="bio" rows="4">여기에 인물 소개 내용</textarea>
    </div>

  </div>

  <div class="meta-list">
    <div class="meta-item">
      <span class="meta-key">출생</span>
      <input class="edit-input meta-input" id="meta0" type="text" value="여기에 출생" />
    </div>
    <div class="meta-item">
      <span class="meta-key">외형</span>
      <input class="edit-input meta-input" id="meta1" type="text" value="여기에 외형" />
    </div>
    <div class="meta-item">
      <span class="meta-key">성격</span>
      <input class="edit-input meta-input" id="meta2" type="text" value="여기에 성격" />
    </div>
    <div class="meta-item">
      <span class="meta-key">소개</span>
      <input class="edit-input meta-input" id="meta3" type="text" value="여기에 간략 배경" />
    </div>
  </div>
</div>

  </div><!-- .card -->

  <div class="footer">
    <span class="footer-note">© 2026 · 인물 소개 페이지</span>
<button class="btn btn-edit" onclick="enterEdit()">Edit Profile</button>
<button class="btn btn-cancel" onclick="cancelEdit()">취소</button>
<button class="btn btn-save" id="saveBtn" onclick="saveEdit()">저장하기</button>

</div><!-- .page -->

<script>
  function loadImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const side = document.getElementById('imageSide');
      const ph   = document.getElementById('placeholder');
      const tag  = document.getElementById('imgTag');

      // remove placeholder, insert img
      ph.remove();
      let img = side.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        side.insertBefore(img, side.querySelector('input'));
      }
      img.src = e.target.result;
      tag.textContent = file.name.replace(/\.[^.]+$/, '');
    };
    reader.readAsDataURL(file);
  }
  let snapshot = {};

function captureValues() {
  return {
    nameEn: val('nameEn'), nameKo: val('nameKo'),
    role:   val('role'),   bio:    val('bio'),
    meta:  [val('meta0'), val('meta1'), val('meta2'), val('meta3')]
  };
}

function val(id) { return document.getElementById(id).value; }
function set(id, v) { document.getElementById(id).value = v; }

function enterEdit() {
  snapshot = captureValues();           // 취소용 스냅샷 저장
  document.body.classList.add('editing');
  document.getElementById('pageLabel').textContent = 'Edit Profile';
  autoResize(document.getElementById('bio'));
}

function cancelEdit() {
  set('nameEn', snapshot.nameEn);       // 스냅샷으로 롤백
  set('nameKo', snapshot.nameKo);
  set('role',   snapshot.role);
  set('bio',    snapshot.bio);
  snapshot.meta.forEach((v, i) => set('meta' + i, v));
  document.body.classList.remove('editing');
  document.getElementById('pageLabel').textContent = 'Profile';
}

function saveEdit() {
  document.body.classList.remove('editing');
  document.getElementById('pageLabel').textContent = 'Profile';
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saved');
  btn.textContent = '저장됨 ✓';
  setTimeout(() => { btn.classList.remove('saved'); btn.textContent = '저장하기'; }, 2000);
}

// textarea 높이 자동 조절
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
document.getElementById('bio').addEventListener('input', function() { autoResize(this); });
</script>

</body>
</html>
