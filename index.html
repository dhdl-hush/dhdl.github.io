<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>감자</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #030712;
      --bg2: #0a0f1e;
      --ink: #e2e8f0;
      --muted: #64748b;
      --cyan: #00f5ff;
      --yellow: #ffd700;
      --red: #ff2d55;
      --grid: rgba(0, 245, 255, 0.04);
      --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.4);
      --glow-yellow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* ── 배경 그리드 ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── 스캔라인 효과 ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 0;
      animation: scanMove 8s linear infinite;
    }
    @keyframes scanMove {
      from { background-position: 0 0; }
      to   { background-position: 0 100px; }
    }

    /* ── 레이아웃 ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* ── 상단 시스템 라벨 ── */
    .sys-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      background: rgba(0, 245, 255, 0.04);
      border-bottom: 1px solid rgba(0, 245, 255, 0.15);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
      z-index: 10;
    }
    .sys-bar-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--cyan);
      opacity: 0.6;
      letter-spacing: 0.1em;
    }
    .sys-bar-item.blink { animation: blink 2s step-end infinite; }
    @keyframes blink {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.1; }
    }
    .sys-bar-spacer { flex: 1; }

    /* ── 메인 타이틀 영역 ── */
    .hero {
      text-align: center;
      position: relative;
      margin-bottom: 64px;
    }

    /* 글리치 라인 */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      border: 1px solid rgba(0, 245, 255, 0.06);
      border-radius: 50%;
      animation: rotateSlow 20s linear infinite;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; height: 400px;
      border: 1px solid rgba(255, 215, 0, 0.06);
      border-radius: 50%;
      animation: rotateSlow 15s linear infinite reverse;
    }
    @keyframes rotateSlow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .hero-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--cyan);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeIn 0.6s 0.3s ease forwards;
    }

    .hero-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(80px, 16vw, 160px);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--ink);
      position: relative;
      opacity: 0;
      animation: fadeIn 0.6s 0.5s ease forwards;
    }

    /* 글리치 효과 */
    .hero-title::before,
    .hero-title::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .hero-title::before {
      color: var(--cyan);
      animation: glitch1 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .hero-title::after {
      color: var(--red);
      animation: glitch2 4s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }
    @keyframes glitch1 {
      0%, 92%, 100% { transform: translate(0); opacity: 0; }
      93% { transform: translate(-3px, 1px); opacity: 0.8; }
      95% { transform: translate(3px, -1px); opacity: 0.8; }
      97% { transform: translate(0); opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 92%, 100% { transform: translate(0); opacity: 0; }
      94% { transform: translate(3px, 2px); opacity: 0.8; }
      96% { transform: translate(-3px, -2px); opacity: 0.8; }
      98% { transform: translate(0); opacity: 0; }
    }

    .hero-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 16px;
      opacity: 0;
      animation: fadeIn 0.6s 0.7s ease forwards;
    }
    .hero-sub span { color: var(--yellow); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 탭 네비게이션 ── */
    .tab-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2px;
      max-width: 640px;
      width: 100%;
      opacity: 0;
      animation: fadeIn 0.6s 0.9s ease forwards;
    }

    .tab-nav a {
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 24px;
      border: 1px solid rgba(100, 116, 139, 0.2);
      background: rgba(10, 15, 30, 0.8);
      position: relative;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      overflow: hidden;
    }

    .tab-nav a::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.08), transparent);
      transition: left 0.4s;
    }
    .tab-nav a:hover::before { left: 100%; }

    .tab-nav a:hover {
      color: var(--cyan);
      border-color: rgba(0, 245, 255, 0.4);
      background: rgba(0, 245, 255, 0.04);
      box-shadow: var(--glow-cyan);
    }

    /* ── 하단 상태 바 ── */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: rgba(0, 245, 255, 0.03);
      border-top: 1px solid rgba(0, 245, 255, 0.1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 32px;
      z-index: 10;
    }
    .status-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: blink 1.5s step-end infinite;
    }
    .status-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

    /* ── 모서리 장식 ── */
    .corner {
      position: fixed;
      width: 20px; height: 20px;
      z-index: 10;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--cyan);
      opacity: 0.5;
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 32px; left: 0; }
    .corner.tr { top: 32px; right: 0; transform: scaleX(-1); }
    .corner.bl { bottom: 28px; left: 0; transform: scaleY(-1); }
    .corner.br { bottom: 28px; right: 0; transform: scale(-1); }

    @media (max-width: 560px) {
      .hero-title { font-size: 80px; }
      .tab-nav a { padding: 10px 16px; font-size: 10px; }
    }
    
    /* ── 떠다니는 감자들 ── */
.potato {
  position: fixed;
  font-size: 2rem;
  pointer-events: none;
  z-index: 0;
  opacity: 0.15;
  animation: floatPotato linear infinite;
  user-select: none;
}
@keyframes floatPotato {
  from {
    transform: translateY(110vh) rotate(0deg);
  }
  to {
    transform: translateY(-10vh) rotate(360deg);
  }
}
  </style>
</head>
<body>

<!-- 상단 시스템 바 -->
<div class="sys-bar">
  <span class="sys-bar-item">SYS://CHARACTER_DB</span>
  <span class="sys-bar-item blink">● ONLINE</span>
  <span class="sys-bar-spacer"></span>
  <span class="sys-bar-item" id="clock">00:00:00</span>
</div>

<!-- 모서리 장식 -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="page">

  <div class="hero">
    <div class="hero-tag">&gt; LOADING PROFILE // ID_0001</div>
    <h1 class="hero-title" data-text="감자">감자</h1>
    <div class="hero-sub">[ <span>SELECT MODULE</span> TO CONTINUE ]</div>
  </div>

  <nav class="tab-nav">
    <a href="/dhdl.github.io/files/profile.html">// 프로필</a>
    <a href="/dhdl.github.io/files/detail.html">// 상세정보</a>
    <a href="/dhdl.github.io/files/story.html">// 배경이야기</a>
    <a href="/dhdl.github.io/files/relation.html">// 관계도</a>
    <a href="/dhdl.github.io/files/behind.html">// 비하인드</a>
    <a href="/dhdl.github.io/files/gallery.html">// 갤러리</a>
  </nav>

</div>

<!-- 하단 상태 바 -->
<div class="status-bar">
  <div class="status-item"><span class="status-dot"></span> FIREBASE CONNECTED</div>
  <div class="status-item"><span class="status-dot yellow"></span> CHAR_LOADED</div>
</div>

<script>
  // 시계
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // 감자 생성
function spawnPotato() {
  const potato = document.createElement('div');
  potato.classList.add('potato');
  potato.textContent = '🥔';

  // 랜덤 위치, 크기, 속도
  potato.style.left = Math.random() * 100 + 'vw';
  potato.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
  potato.style.animationDuration = (8 + Math.random() * 12) + 's';
  potato.style.animationDelay = (Math.random() * 5) + 's';
  potato.style.opacity = (0.05 + Math.random() * 0.15).toFixed(2);

  document.body.appendChild(potato);

  // 애니메이션 끝나면 삭제하고 다시 생성
  potato.addEventListener('animationend', () => {
    potato.remove();
    spawnPotato();
  });
}

// 감자 10개 동시에 띄우기
for (let i = 0; i < 10; i++) {
  spawnPotato();
}
</script>

</body>
</html>
