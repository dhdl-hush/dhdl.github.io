<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>감자</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --ink: #1a1714;
      --muted: #7a7269;
      --accent: #b8a98a;
      --line: #ddd8cf;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 720px; width: 100%;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 타이틀 영역 ── */
    .hero {
      text-align: center;
      padding: 80px 0 72px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 0;
    }

    .hero-sub {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    /* ── 탭 네비게이션 ── */
    .tab-nav {
      display: flex;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-nav a {
      text-decoration: none;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted);
      padding: 16px 20px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-nav a:hover { color: var(--ink); }

    /* ── 푸터 ── */
    .footer {
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .footer-note {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="page">

  <div class="hero">
    <div class="hero-sub">Character</div>
    <h1 class="hero-title">감자</h1>
    <p class="hero-desc">탭을 선택해 인물 정보를 확인하세요</p>
  </div>

  <nav class="tab-nav">
<a href="/files/profile.html">프로필</a>
<a href="/index/detail.html">상세정보</a>
<a href="/index/story.html">배경이야기</a>
<a href="/index/relation.html">관계도</a>
<a href="/index/behind.html">비하인드</a>
<a href="/index/gallery.html">갤러리</a>
  </nav>

  <div class="footer">
    <span class="footer-note">© 2026 · 인물 소개 페이지</span>
  </div>

</div>

</body>
</html>
